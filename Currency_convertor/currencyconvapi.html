<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <style>
        body{
            margin:0;
            padding:0;
            background-color:#f4e4ba;
            text-align:center;
            min-height:100vh;
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .container{
            background-color:#bea18a;
            text-align:center;
            height:70vh;
            width:50vw;
            border-radius:8px;
        }

        h1{
            margin-top:20px;
            color:#4a2c2a;
        }

        .box{
            width:100%;
            padding:20px;
            display:flex;
            justify-content:space-around;
            align-items:center;
            background-color:#b7d1ec;
            margin:auto;
            border-radius:10px;
            box-sizing:border-box;
        }

        .col{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
        }

        .row{
            display:flex;
            align-items:center;
            gap:10px;
        }

        select{
            height:40px;
            width:130px;
            background-color:blueviolet;
            color:white;
            border:none;
            border-radius:5px;
        }

        .btn{
            width:120px;
            height:40px;
            background-color:brown;
            color:aliceblue;
            border:none;
            border-radius:9px;
            cursor:pointer;
            font-weight:bold;
            font-size:large;

        }

        .btn:hover{
            background-color:green;
        }

        img{
            height:3rem;
        }

        .arrow{
            font-size:80px;
        }

        input{
            height:35px;
            width:200px;
            border-radius:5px;
            border:1px solid #999;
            padding-left:10px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>CURRENCY CONVERTER</h1>

    <p>Enter Amount</p>
    <input type="text" id="amount" placeholder="Amount"><br><br>

    <div class="box">

        <!-- FROM -->
        <div class="col">
            <p>FROM</p>
            <div class="row">
                <img id="from-flag" src="https://flagsapi.com/US/flat/64.png" alt="">
                <select id="from-currency">
                    <option value="" disabled selected>Select country</option>
                </select>
            </div>
        </div>

        <!-- Arrow -->
        <span class="arrow">&#8644;</span>

        <!-- TO -->
        <div class="col">
            <p>TO</p>
            <div class="row">
                <img id="to-flag" src="https://flagsapi.com/IN/flat/64.png" alt="">
                <select id="to-currency">
                    <option value="" disabled selected>Select country</option>
                </select>
            </div>
        </div>

    </div>

    <p>Result Amount</p>
    <input type="text" id="result" placeholder="Amount" readonly><br><br>

    <button class="btn" id="convert-btn">Convert</button>
</div>

<script src="currencyconvapi.js"></script>
</body>
</html>
